name: Nik
options:
  bundleIdPrefix: com.miladfarazian
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    CODE_SIGN_STYLE: Automatic
targets:
  Nik:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.miladfarazian.nik
        INFOPLIST_FILE: Sources/Info.plist
        ENABLE_PREVIEWS: YES
        SWIFT_STRICT_CONCURRENCY: minimal
