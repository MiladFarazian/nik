name: Nik
options:
  bundleIdPrefix: com.miladfarazian
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: Y6PNCRVZH7
schemes:
  Nik:
    build:
      targets:
        Nik: all
    run:
      config: Debug
      storeKitConfiguration: Nik.storekit
targets:
  Nik:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: catalog
        buildPhase: resources
      - path: previews
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.miladfarazian.nik
        INFOPLIST_FILE: Sources/Info.plist
        ENABLE_PREVIEWS: YES
        SWIFT_STRICT_CONCURRENCY: minimal
